name: Build & Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVICE_NAME: user-service
  REGISTRY: registry.ms-repos.com

jobs:
  docker:
    runs-on: ubuntu-latest
    environment: java_deploy

    env:
      NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
      NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- DNS workaround ---
      - name: Add repository and Nexus host entry
        run: |
          echo "144.24.176.218 registry.ms-repos.com" | sudo tee -a /etc/hosts
          echo "144.24.176.218 nexus.ms-repos.com" | sudo tee -a /etc/hosts

      # --- JAVA + MAVEN ---
      - name: Set up JDK 17 and Maven auth
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          server-id: nexus
          server-username: NEXUS_USERNAME
          server-password: NEXUS_PASSWORD

      - name: Configure Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <mirrors>
              <mirror>
                <id>nexus</id>
                <mirrorOf>*</mirrorOf>
                <url>https://nexus.ms-repos.com/repository/maven-public/</url>
              </mirror>
            </mirrors>
            <servers>
              <server>
                <id>nexus</id>
                <username>${NEXUS_USERNAME}</username>
                <password>${NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Import Nexus cert into JVM
        run: |
          echo "${{ secrets.NPM_CA_CERT }}" > nexus.crt
          sudo keytool -importcert -noprompt \
            -alias nexus-ms-repos \
            -file nexus.crt \
            -keystore "$JAVA_HOME/lib/security/cacerts" \
            -storepass changeit

      # --- CACHE MAVEN ---
      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Build JAR
        run: mvn clean package -pl "$SERVICE_NAME" -am -DskipTests

      # --- DOCKER CERT ---
      - name: Trust Nexus certificate for Docker
        run: |
          sudo mkdir -p /etc/docker/certs.d/${REGISTRY}
          echo "${{ secrets.NPM_CA_CERT }}" | sudo tee /etc/docker/certs.d/${REGISTRY}/ca.crt
          sudo systemctl restart docker

      # --- LOGIN ---
      - name: Login to registry
        run: |
          echo "${{ secrets.REPOSITORY_PASSWORD }}" | docker login $REGISTRY \
            --username "${{ secrets.REPOSITORY_USERNAME }}" \
            --password-stdin

      # --- VERSION ---
      - name: Read version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # --- MULTI-ARCH SETUP ---
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create buildkit config
        run: |
          cat > buildkitd.toml <<EOF
          [registry."registry.ms-repos.com"]
            insecure = true
          EOF

      - name: Create buildx builder
        run: |
          docker buildx create \
            --use \
            --name mybuilder \
            --driver docker-container \
            --driver-opt network=host \
            --config buildkitd.toml

      - name: Build & Push
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --add-host registry.ms-repos.com:144.24.176.218 \
            --add-host nexus.ms-repos.com:144.24.176.218 \
            -t $REGISTRY/$SERVICE_NAME:${{ steps.version.outputs.version }} \
            --push \
            "$SERVICE_NAME"
